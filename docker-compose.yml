services:
  # The game server itself (headless ATT under Wine).
  att-server:
    build: .
    image: att-server:1.8.0
    container_name: att-server
    restart: unless-stopped
    env_file: .env
    # REQUIRED. Under Docker's default bridge network the game binds UDP 1757 on
    # IPv6 only ([::]), so friends connecting over IPv4 hit nothing and every join
    # silently times out. Host networking makes it bind dual-stack (*:1757)
    # directly on the box, which is what actually lets people join. Do not swap
    # this back for a `ports:` block. (See README "Why host networking".)
    network_mode: host
    volumes:
      # Your own patched "A Township Tale" server folder (you supply this — the
      # kit ships no game files). Defaults to ./game inside the repo.
      - ${ATT_GAME_DIR:-./game}:/game
      # World saves + Wine state live here, so they survive restarts/rebuilds.
      - wineprefix:/wine
    # Wine occasionally needs a larger ptrace/seccomp surface; uncomment only if
    # the server faults during boot (see README "Troubleshooting").
    # cap_add: [SYS_PTRACE]
    # security_opt: [seccomp:unconfined]

  # OPTIONAL community-listing heartbeat — the FALLBACK for join-by-IP.
  #
  # v1.8.0's TavernLib can advertise the server itself (native listing), and the
  # entrypoint writes a server-config.yaml from your .env so it will. BUT that
  # native registration goes out over whatever address the box prefers, and most
  # VPSes default to IPv6 outbound — so it can list your IPv6 while friends type
  # your IPv4 and never match. This sidecar re-POSTs the listing forced over IPv4
  # (curl -4), which is the proven fix.
  #
  # It does NOT start by default. Test native first; if the lookup endpoint
  # doesn't return your IPv4 (see UPGRADE-1.8.0.md → "Test the listing"), enable
  # this with:   docker compose --profile fallback up -d
  att-register:
    image: curlimages/curl:latest
    container_name: att-register
    restart: unless-stopped
    network_mode: host
    env_file: .env
    profiles: ["fallback"]
    volumes:
      - ./register.sh:/register.sh:ro
    entrypoint: ["sh", "/register.sh"]

# Voice is no longer a service here. v1.8.0 integrates CircuitLord's official
# voice chat (CircuitsVoiceChat), which ships in your patched game folder — so
# the old self-hosted att-voice relay is gone. Nothing to run server-side.

volumes:
  wineprefix:
